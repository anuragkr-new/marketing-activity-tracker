# One Railway service: Node serves /api/* and the built React app from client/dist.
# Variables: DATABASE_URL (Postgres), VITE_ADMIN_PIN (at build time for client bundle).
# After first deploy: run `npm run db:setup` once in a Railway shell.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
